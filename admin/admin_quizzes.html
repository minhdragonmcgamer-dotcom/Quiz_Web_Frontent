<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{fragments/admin_layout :: layout(~{::main})}">


<body>

<main>
    <h2>📚 Quiz Management</h2>
    <table style="width: 100%; border-collapse: collapse; text-align: center;">
        <thead>
            <tr style="background-color: #f2f2f2;">
                <th style="padding: 12px; border: 1px solid #ddd;">Title</th>
                <th style="padding: 12px; border: 1px solid #ddd;">Action</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="q : ${quizzes}">
                <td style="padding: 10px; border: 1px solid #ddd;" th:text="${q.title}"></td>
                <td style="padding: 10px; border: 1px solid #ddd;">
                    <a th:href="@{'/admin/quiz/' + ${q.quizId}}">
                        <button class="btn-primary">View</button>
                    </a>
                    <a th:href="@{'/admin/quiz/delete/' + ${q.quizId}}"
                       onclick="return confirm('Xóa quiz?')">
                        <button class="btn-danger">Delete</button>
                    </a>
                </td>
            </tr>
        </tbody>
    </table>
</main>

</body>
</html>
