<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{fragments/admin_layout :: layout(~{::main})}">

<body>

<main>
    <h2>👥 User Management</h2>
    <div th:if="${error}" style="color:red; font-weight:bold; text-align: center;">
        <p th:text="${error}"></p>
    </div>
    <table style="width: 100%; border-collapse: collapse; text-align: center;">
        <thead>
            <tr style="background-color: #f2f2f2;">
                <th style="padding: 12px; border: 1px solid #ddd;">Username</th>
                <th style="padding: 12px; border: 1px solid #ddd;">Role</th>
                <th style="padding: 12px; border: 1px solid #ddd;">Status</th>
                <th style="padding: 12px; border: 1px solid #ddd;">Action</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="u : ${users}">
                <td style="padding: 10px; border: 1px solid #ddd;" th:text="${u.username}"></td>
                <td style="padding: 10px; border: 1px solid #ddd;" th:text="${u.role}"></td>
                <td style="padding: 10px; border: 1px solid #ddd;" 
                    th:styleappend="${u.locked} ? 'color: red; font-weight: bold;' : 'color: green;'"
                    th:text="${u.locked ? 'LOCKED' : 'ACTIVE'}"></td>
                <td style="padding: 10px; border: 1px solid #ddd;">
                    <a th:href="@{'/admin/user/lock/' + ${u.id}}"><button class="btn-warning">Lock</button></a>
                    <a th:href="@{'/admin/user/unlock/' + ${u.id}}"><button class="btn-primary">Unlock</button></a>
                    <a th:href="@{'/admin/user/delete/' + ${u.id}}" onclick="return confirm('Delete this user?')">
                        <button class="btn-danger">Delete</button>
                    </a>
                    <form th:action="@{/admin/user/role}" method="get" style="display:inline-block; margin-left: 5px;">
                        <input type="hidden" name="id" th:value="${u.id}">
                        <select name="role" style="padding: 3px;">
                            <option value="ROLE_STUDENT" th:selected="${u.role == 'ROLE_STUDENT'}">Student</option>
                            <option value="ROLE_TEACHER" th:selected="${u.role == 'ROLE_TEACHER'}">Teacher</option>
                            <option value="ROLE_ADMIN" th:selected="${u.role == 'ROLE_ADMIN'}">Admin</option>
                        </select>
                        <button type="submit">Change</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</main>

</body>
</html>
