<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{fragments/admin_layout :: layout(~{::main})}">

<body>

<main>
    <h2>📈 Results</h2>
    <table style="width: 100%; border-collapse: collapse; text-align: center;">
        <thead>
            <tr style="background-color: #f2f2f2;">
                <th style="padding: 12px; border: 1px solid #ddd;">User</th>
                <th style="padding: 12px; border: 1px solid #ddd;">Quiz</th>
                <th style="padding: 12px; border: 1px solid #ddd;">Score</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="r : ${results}">
                <td style="padding: 10px; border: 1px solid #ddd;" th:text="${r.user.username}"></td>
                <td style="padding: 10px; border: 1px solid #ddd;" th:text="${r.quiz.title}"></td>
                <td style="padding: 10px; border: 1px solid #ddd;">
                    <span th:text="${r.score}"></span> /
                    <span th:text="${r.totalQuestion}"></span>
                </td>
            </tr>
        </tbody>
    </table>
</main>

</body>
</html>
