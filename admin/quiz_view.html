<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{fragments/admin_layout :: layout(~{::main})}">

<main style="max-width: 900px; margin: 0 auto; padding: 20px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
        <h2 style="color: #2f3640; margin: 0;">📖 Quiz Detail</h2>
        <a href="/admin/quizzes" style="text-decoration: none; color: #7f8c8d;">← Quay lại</a>
    </div>

    <div class="card" style="background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-left: 5px solid #273c75; margin-bottom: 30px;">
        <h3 th:text="${quiz.title}" style="margin-top: 0; color: #273c75; font-size: 1.6rem;"></h3>
        <div style="display: flex; gap: 20px; color: #636e72;">
            <span>Chế độ: 
                <span th:text="${quiz.isPublic ? '🌐 Public' : '🔒 Private'}" 
                      th:style="${quiz.isPublic} ? 'color: #27ae60; font-weight:bold;' : 'color: #e67e22; font-weight:bold;'"></span>
            </span>
            <span>Tổng số câu hỏi: <b th:text="${#lists.size(quiz.questions)}" style="color: #2f3640;"></b></span>
        </div>
    </div>

    <div th:each="q, i : ${quiz.questions}" class="card" style="background: #fff; padding: 20px; margin-bottom: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);">
        <h4 style="color: #1a73e8; margin-bottom: 15px;">
            Câu <span th:text="${i.index + 1}"></span>: 
            <span th:text="${q.content}" style="color: #2d3436; font-weight: 500;"></span>
        </h4>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div th:each="opt : ${q.options}" 
                 th:style="${opt.correct} ? 'background: #f1f9f5; border: 1px solid #2ecc71; color: #27ae60;' : 'background: #f8f9fa; border: 1px solid #eee; color: #636e72;'"
                 style="padding: 12px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center;">
                
                <span th:text="${opt.content}"></span>
                <span th:if="${opt.correct}" style="font-size: 1.2rem;">✔</span>
            </div>
        </div>
    </div>
</main>

</html>
