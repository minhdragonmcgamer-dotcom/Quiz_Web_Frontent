<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/student_layout :: layout(~{::section})}">

<section style="max-width: 800px; margin: 0 auto; padding: 20px;">
    <div th:if="${(assignment?.timeLimit != null and assignment.timeLimit > 0) or (quiz?.timeLimit != null and quiz.timeLimit > 0)}"
        id="timer-container"
        style="position: fixed !important; top: 20px !important; left: 50% !important; 
                transform: translateX(-50%) !important; z-index: 999999 !important; 
                width: auto; pointer-events: none;">
        
        <div style="background: white; padding: 12px 30px; border-radius: 50px; 
                    box-shadow: 0 10px 25px rgba(0,0,0,0.2); color: #e84118; 
                    font-weight: bold; font-size: 1.4rem; border: 2px solid #e84118; 
                    display: flex; align-items: center; gap: 10px; pointer-events: auto;">
            ⏳ <span id="timer">00:00</span>
        </div>
    </div>

    <div style="height: 60px;"></div>

    <div style="text-align: center; margin-bottom: 40px;">
        <h2 th:text="${quiz.title}" style="color: #2f3640; font-size: 2rem; margin-bottom: 10px;"></h2>
    </div>


    <form action="/submit" method="post">
        <input type="hidden" name="quizId" th:value="${quiz.quizId}">
        <input type="hidden" name="assignmentId" th:value="${assignment != null ? assignment.id : ''}">

        <div th:each="q, i : ${quiz.questions}" class="question-container" style="background: white; padding: 30px; margin-bottom: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05);">
            <h3 style="font-size: 1.2rem; color: #2d3436; margin-bottom: 20px; line-height: 1.5;">
                <span style="background: #273c75; color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.9rem; margin-right: 10px;">Câu [[${i.index + 1}]]</span>
                <span th:text="${q.content}"></span>
            </h3>

            <div class="options-list">
                <div th:each="opt : ${q.options}" style="margin-bottom: 12px;">
                    <label class="custom-option">
                        <input type="radio" th:name="${'q_' + q.questionId}" th:value="${opt.optionId}" required>
                        <div class="option-content">
                            <span class="radio-circle"></span>
                            <span th:text="${opt.content}"></span>
                        </div>
                    </label>
                </div>
            </div>
        </div>

        <button class="submit-btn">Submit</button>
    </form>

    <style>
        .custom-option { display: block; cursor: pointer; }
        .custom-option input { display: none; } 
        
        .option-content {
            padding: 15px 20px;
            border: 2px solid #f1f2f6;
            border-radius: 10px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            color: #2f3640;
        }

        .radio-circle {
            width: 18px; height: 18px; border: 2px solid #dcdde1;
            border-radius: 50%; margin-right: 15px; position: relative;
        }

        /* Khi được chọn */
        .custom-option input:checked + .option-content {
            border-color: #273c75; background: #f0f3ff; font-weight: bold;
        }
        .custom-option input:checked + .option-content .radio-circle {
            border-color: #273c75;
        }
        .custom-option input:checked + .option-content .radio-circle::after {
            content: ''; width: 10px; height: 10px; background: #273c75;
            border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        }

        .submit-btn {
            display: block; width: 100%; max-width: 300px; margin: 40px auto;
            padding: 15px; background: #273c75; color: white; border: none;
            border-radius: 30px; font-size: 1.1rem; font-weight: bold;
            cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(39, 60, 117, 0.2);
        }
        .submit-btn:hover { background: #192a56; transform: translateY(-3px); }
    </style>


    <script th:inline="javascript">
    document.addEventListener("DOMContentLoaded", function () {

        let timeLimit = parseInt([[${assignment?.timeLimit != null ? assignment.timeLimit * 60 
            : (quiz?.timeLimit != null ? quiz.timeLimit * 60 : -1)}]]) ;

        const form = document.querySelector("form");
        const timerDisplay = document.getElementById("timer");

        let isSubmitting = false;

        function formatTime(seconds) {
            let m = Math.floor(seconds / 60);
            let s = seconds % 60;
            return (m < 10 ? "0" : "") + m + ":" +
                (s < 10 ? "0" : "") + s;
        }

        // ================= TIMER =================
        if (timeLimit !== -1 && timerDisplay) {

            timerDisplay.innerText = formatTime(timeLimit);

            const interval = setInterval(() => {
                timeLimit--;

                if (timeLimit <= 0) {
                    clearInterval(interval);
                    timerDisplay.innerText = "00:00";
                    alert("Time's up!");
                    isSubmitting = true;
                    if (form) form.submit();
                    return;
                }

                timerDisplay.innerText = formatTime(timeLimit);

            }, 1000);
        }

        // ================= SUBMIT =================
        if (form) {
            form.addEventListener("submit", function () {
                isSubmitting = true; 
            });
        }

        // ================= CHẶN CLICK LINK =================
        document.querySelectorAll("a[href]").forEach(link => {
            link.addEventListener("click", function (e) {

                if (isSubmitting) return;

                const confirmLeave = confirm("You haven't submitted your answers. Do you want to submit before leaving?");

                if (confirmLeave) {
                    e.preventDefault();
                    isSubmitting = true;
                    if (form) form.submit();
                }
            });
        });

        // ================= CHẶN BACK BUTTON FIX =================
        history.pushState(null, null, location.href);

        window.addEventListener("popstate", function () {

            if (isSubmitting) return;

            const confirmLeave = confirm("Submit before leaving?");

            if (confirmLeave) {
                isSubmitting = true;
                if (form) form.submit();
            } else {
                history.pushState(null, null, location.href);
            }
        });

        // ================= CHẶN RELOAD / ĐÓNG TAB =================
        window.addEventListener("beforeunload", function (e) {
            if (isSubmitting) return;

            e.preventDefault();
            e.returnValue = ""; 
        });


    });
    </script>



</section>

<style>

.card {
    background: white;
    padding: 20px;
    margin-bottom: 15px;
    border-radius: 10px;
    box-shadow: 0 0 5px rgba(0,0,0,0.1);
}

.option {
    margin: 8px 0;
}

.option-label {
    display: block;
    padding: 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.2s;
    border: 1px solid #ddd;
}

.option-label:hover {
    background: #f1f2f6;
}

input[type="radio"] {
    margin-right: 10px;
}

.submit-btn {
    margin-top: 20px;
    padding: 12px 20px;
    background: #273c75;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.submit-btn:hover {
    background: #40739e;
}


.timer-wrapper {
    position: fixed; 
    top: 20px;       
    left: 50%;       
    transform: translateX(-50%);
    z-index: 10000;  
    pointer-events: none;
    width: auto;
}

.timer-box {
    background: #ffffff;
    padding: 10px 25px;
    border-radius: 50px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    color: #e84118;
    font-weight: bold;
    font-size: 1.2rem;
    border: 2px solid #e84118;
    pointer-events: auto;
    display: flex;
    align-items: center;
    gap: 8px;
}

</style>



</html>
