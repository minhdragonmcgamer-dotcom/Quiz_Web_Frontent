<html xmlns:th="http://www.thymeleaf.org"
      th:replace="fragments/student_layout :: layout(~{::section})">

<section style="max-width: 1200px; margin: 0 auto; padding: 20px;">
    
    <div style="margin-bottom: 30px;">
        <h2 style="color: #2c3e50; margin: 0;">Available Quizzes</h2>
    </div>

    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px;">
        
        <div class="card" th:each="q : ${quizzes}" 
             style="background: #fff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); padding: 20px; border: none; display: flex; flex-direction: column; justify-content: space-between;">
            
            <div>
                <h3 th:text="${q.title}" style="color: #2c3e50; margin: 10px 0; font-size: 1.2rem; line-height: 1.4;"></h3>
            </div>

            <a th:href="@{'/quiz/' + ${q.quizId}}" class="btn btn-primary" 
               style="text-align: center; margin-top: 15px; border-radius: 6px; padding: 10px; font-weight: bold; text-decoration: none;">
               Do Quiz
            </a>
        </div>
    </div>
</section>
</html>
