<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{fragments/admin_layout :: layout(~{::main})}">

<body>

<main>
    
<h2>👥 Quản lý User</h2>

<div th:if="${error}" style="color:red; font-weight:bold;">
    <p th:text="${error}"></p>
</div>

<table>
    <tr>
        <th>Username</th>
        <th>Role</th>
        <th>Status</th>
        <th>Action</th>
    </tr>

    <tr th:each="u : ${users}">
        <td th:text="${u.username}"></td>
        <td th:text="${u.role}"></td>
        <td th:text="${u.locked ? 'LOCKED' : 'ACTIVE'}"></td>

        <td>

            <a th:href="@{'/admin/user/lock/' + ${u.id}}">
                <button class="btn-warning">Lock</button>
            </a>

            <a th:href="@{'/admin/user/unlock/' + ${u.id}}">
                <button class="btn-primary">Unlock</button>
            </a>

            <a th:href="@{'/admin/user/delete/' + ${u.id}}"
               onclick="return confirm('Xóa user?')">
                <button class="btn-danger">Delete</button>
            </a>

            <form th:action="@{/admin/user/role}" method="get" style="display:inline;">
                <input type="hidden" name="id" th:value="${u.id}">

                <select name="role">
                    <option value="ROLE_STUDENT" th:selected="${u.role == 'ROLE_STUDENT'}">Student</option>
                    <option value="ROLE_TEACHER" th:selected="${u.role == 'ROLE_TEACHER'}">Teacher</option>
                    <option value="ROLE_ADMIN" th:selected="${u.role == 'ROLE_ADMIN'}">Admin</option>
                </select>

                <button type="submit">Change</button>
            </form>

        </td>
    </tr>
</table>

</main>

</body>
</html>
