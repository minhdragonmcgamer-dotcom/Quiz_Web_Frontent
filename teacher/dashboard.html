<html xmlns:th="http://www.thymeleaf.org"
      th:replace="fragments/teacher_layout :: layout(~{::section})">

<section style="max-width: 1200px; margin-left: 0; padding: 20px;">
    <h2>My Quizzes</h2>
    <table style="width: 100%; border-collapse: collapse; text-align: center;">
        <thead>
            <tr style="background-color: #f2f2f2;">
                <th style="padding: 12px; border: 1px solid #ddd;">ID</th>
                <th style="padding: 12px; border: 1px solid #ddd;">Title</th>
                <th style="padding: 12px; border: 1px solid #ddd;">Questions</th>
                <th style="padding: 12px; border: 1px solid #ddd;">Mode</th>
                <th style="padding: 12px; border: 1px solid #ddd;">Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="q : ${quizzes}">
                <td style="padding: 10px; border: 1px solid #ddd;" th:text="${q.quizId}"></td>
                <td style="padding: 10px; border: 1px solid #ddd;" th:text="${q.title}"></td>
                <td style="padding: 10px; border: 1px solid #ddd;" th:text="${#lists.size(q.questions)}"></td>
                <td style="padding: 10px; border: 1px solid #ddd;">
                    <span th:text="${q.isPublic ? 'Public' : 'Private'}"></span>
                <td style="padding: 10px; border: 1px solid #ddd;">
                    <a th:href="@{'/teacher/edit/' + ${q.quizId}}">Edit</a>

                    <a th:href="@{'/teacher/delete/' + ${q.quizId}}"
                    style="color:red; margin-left:10px;">Delete</a>

                    <a th:href="@{'/teacher/result/' + ${q.quizId}}"
                    style="margin-left:10px;">Scores</a>

                    <a th:href="@{'/teacher/import/' + ${q.quizId}}"
                    style="margin-left:10px; color:green;">
                    Import
                    </a>
                </td>
            </tr>
        </tbody>
    </table>
</section>
