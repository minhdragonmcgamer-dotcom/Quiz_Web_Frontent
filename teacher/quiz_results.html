<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/teacher_layout :: layout(~{::section})}">

<section style="max-width: 1200px; margin-left: 0; padding: 20px;">

    <h2 th:text="'Results of Quiz: ' + ${quiz.title}"></h2>

    <table style="width: 100%; border-collapse: collapse; text-align: center; margin-top: 20px;">

        <thead>
            <tr style="background-color: #f2f2f2;">
                <th style="padding: 12px; border: 1px solid #ddd;">Username</th>
                <th style="padding: 12px; border: 1px solid #ddd;">Student Code</th>
                <th style="padding: 12px; border: 1px solid #ddd;">Score</th>
                <th style="padding: 12px; border: 1px solid #ddd;">Total</th>
                <th style="padding: 12px; border: 1px solid #ddd;">Percentage</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="r : ${results}">

                <td style="padding: 10px; border: 1px solid #ddd;"
                    th:text="${r.user.username}">
                </td>

                <td style="padding: 10px; border: 1px solid #ddd;"
                    th:text="${r.user.studentCode}">
                </td>

                <td style="padding: 10px; border: 1px solid #ddd;"
                    th:text="${r.score}">
                </td>

                <td style="padding: 10px; border: 1px solid #ddd;"
                    th:text="${r.totalQuestion}">
                </td>

                <td style="padding: 10px; border: 1px solid #ddd;">

                    <span th:text="${r.totalQuestion == 0 or r.score == 0 ? '0%' :
                        #numbers.formatDecimal(r.score * 100.0 / r.totalQuestion, 0, 2) + '%'}">
                    </span>

                </td>

            </tr>

            <tr th:if="${#lists.isEmpty(results)}">
                <td colspan="5"
                    style="padding: 20px; border: 1px solid #ddd; color: #777;">
                    No results available
                </td>
            </tr>
        </tbody>

    </table>

    <script th:inline="javascript">
        let isTimeout = [[${timeout}]];

        if (isTimeout) {
            alert("Time's up!");
        }
    </script>

</section>
</html>
